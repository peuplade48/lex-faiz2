# .github/workflows/fetch-report.yml

name: Mevzuat Raporunu Oluştur (Bağımsız)

# Repoya yazma izni veriyoruz ki report.json dosyasını commit'leyebilsin.
permissions:
  contents: write

on:
  # Zamanlanmış görev: Her gün sabah 06:00'da (TSİ) çalışır.
  schedule:
    - cron: "0 3 * * *"
  # Manuel tetikleme: GitHub Actions arayüzünden elle çalıştırabilmek için.
  workflow_dispatch:

jobs:
  build-report:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Kopyala
        uses: actions/checkout@v4

      - name: Python 3.10 Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Python Kütüphanelerini Yükle
        run: |
          python -m pip install --upgrade pip
          pip install httpx "pypdf[crypto]" pydantic

      - name: Mevzuat Analizini Çalıştır ve Raporu Oluştur
        id: analyze_script
        run: |
          # Bu adım, mevzuat-api.py dosyasından bağımsız olarak çalışır.
          # Tüm mantık bu YAML dosyasının içindedir.
          python - <<'EOF'
          import io
          import re
          import os
          import httpx
          import asyncio
          import traceback
          import json
          from pypdf import PdfReader
          from typing import Optional, List
          from datetime import datetime
          from pydantic import BaseModel, Field

          # --- Modeller ---
          class AnalysisResult(BaseModel):
              rate: Optional[str] = None
              ai_prompt: Optional[str] = None
              error: Optional[str] = None
              raw_ai_response: Optional[str] = None
          # --- Sabitler ---
          PDF_URL = "https://www.mevzuat.gov.tr/MevzuatMetin/1.3.6183.pdf"
          # GÜVENLİK UYARISI: API anahtarı doğrudan koda eklenmiştir. Bu reponun gizli olduğundan emin olun.
          GEMINI_API_KEY = "AIzaSyAMq4AXvIehXlakAaKuErCQZnvNKA-HOZ0"

          # --- Fonksiyonlar ---
          async def make_request_with_retry(client, method: str, url: str, retries=3, backoff_factor=1.0, **kwargs):
              """Ağ hatalarına karşı yeniden deneme mekanizması ile HTTP isteği yapar."""
              for i in range(retries):
                  try:
                      resp = await client.request(method, url, **kwargs)
                      resp.raise_for_status()  # HTTP 4xx veya 5xx hatalarında exception fırlatır
                      return resp
                  except (httpx.TimeoutException, httpx.NetworkError) as e:
                      if i == retries - 1: # Son denemede de hata olursa
                          raise e
                      wait_time = backoff_factor * (2 ** i)
                      print(f"İstek hatası: {e}. {wait_time:.2f} saniye sonra yeniden denenecek ({i+1}/{retries})...")
                      await asyncio.sleep(wait_time)
              raise Exception("Tüm yeniden denemeler başarısız oldu.")

          async def call_gemini_api(prompt: str, client: httpx.AsyncClient):
              """Gemini API'sine yeniden deneme mekanizması ile istek atar."""
              model_name = "models/gemini-1.5-flash"
              api_url = f"https://generativelanguage.googleapis.com/v1beta/{model_name}:generateContent?key={GEMINI_API_KEY}"
              payload = {"contents": [{"parts": [{"text": prompt}]}]}
              
              try:
                  resp = await make_request_with_retry(client, "POST", api_url, json=payload, timeout=45.0)
                  data = resp.json()
                  return data['candidates'][0]['content']['parts'][0]['text'].strip(), None
              except httpx.HTTPStatusError as e:
                  return None, f"Gemini API Hatası: {e.response.status_code} - {e.response.text}"
              except Exception as e:
                  return None, f"Gemini API Bağlantı Hatası: {str(e)}"

          async def perform_analysis():
              """Ana analiz sürecini yönetir."""
              if not GEMINI_API_KEY:
                  return {"last_run": datetime.now().isoformat(), "report": "Hata: GEMINI_API_KEY ayarlanmamış."}

              prompt = (
                  "6183 sayılı Amme Alacaklarının Tahsil Usulü Hakkında Kanun'un 51. maddesine göre "
                  "güncel aylık gecikme zammı oranı yüzde kaçtır? "
                  "Lütfen SADECE rakam olarak (Örn: 4.5) yanıt ver."
              )

              try:
                  async with httpx.AsyncClient() as client:
                      raw_response, error = await call_gemini_api(prompt, client)

                  if error:
                      result = AnalysisResult(error=error, ai_prompt=prompt)
                  else:
                      match = re.search(r"(\d+(?:[.,]\d+)?)", raw_response)
                      rate_value = match.group(1).replace(",", ".") if match else "Bulunamadı"
                      result = AnalysisResult(rate=rate_value, ai_prompt=prompt, raw_ai_response=raw_response)
                  
                  return {"last_run": datetime.now().isoformat(), "report": result}

              except httpx.TimeoutException as e:
                  raise Exception(f"Ağ zaman aşımı: {e.request.url} adresine bağlanılamadı.") from e
              except Exception as e:
                  error_detail = traceback.format_exc()
                  return {
                      "last_run": datetime.now().isoformat(), 
                      "report": f"Kritik Hata: {str(e)} | Detay: {error_detail.splitlines()[-1]}"
                  }

          async def main():
              """Scriptin ana giriş noktası."""
              print("Mevzuat analizi başlatılıyor...")
              report_data = await perform_analysis()
              
              # Pydantic modelini JSON'a çevir
              def json_converter(o):
                  if isinstance(o, BaseModel):
                      return o.model_dump(exclude_none=True)
                  if isinstance(o, datetime):
                      return o.isoformat()
                  return str(o)

              with open("report.json", "w", encoding="utf-8") as f:
                  json.dump(report_data, f, ensure_ascii=False, indent=2, default=json_converter)
              
              print("report.json dosyası başarıyla oluşturuldu.")

          if __name__ == "__main__":
              asyncio.run(main())
          EOF

      - name: Değişiklikleri Commit'le ve Push'la
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add report.json
          # Sadece `report.json` dosyasında değişiklik varsa commit yap.
          # Değişiklik yoksa hata vermeden işlemi bitir.
          git diff --staged --quiet || git commit -m "Mevzuat Raporu Güncellendi: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push
